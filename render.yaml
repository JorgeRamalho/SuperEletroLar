services:
  - type: web
    name: super-eletrolar
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run deploy:build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: RENDER
        value: "true"

# Disco persistente (pedidos/usuários) — disponível apenas em planos pagos:
