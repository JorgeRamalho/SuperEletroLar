databases:
  - name: super-eletrolar-db
    plan: free
    databaseName: super_eletrolar
    user: super_eletrolar
    region: oregon

services:
  - type: web
    name: super-eletrolar
    runtime: node
    plan: free
    region: oregon
    repo: https://github.com/JorgeRamalho/SuperEletroLar
    branch: main
    buildCommand: npm run deploy:build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: super-eletrolar-db
          property: connectionString
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_WEBHOOK_URL
        sync: false
