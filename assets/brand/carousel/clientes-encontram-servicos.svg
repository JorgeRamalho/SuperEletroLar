<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Clientes buscando serviços">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0047AB"/>
      <stop offset="50%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00C9A7"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="900" cy="500" r="150" fill="#FFFFFF" fill-opacity="0.06"/>
  <circle cx="750" cy="100" r="60" fill="#FFFFFF" fill-opacity="0.1"/>
  <!-- Person -->
  <g transform="translate(620, 140)">
    <ellipse cx="80" cy="380" rx="90" ry="20" fill="#000" fill-opacity="0.2"/>
    <circle cx="80" cy="120" r="55" fill="#FFD4C2"/>
    <path d="M30 200 Q80 170 130 200 L140 340 Q80 360 20 340 Z" fill="#FFFFFF" fill-opacity="0.9"/>
    <circle cx="80" cy="115" r="52" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5"/>
  </g>
  <!-- Phone with search -->
  <g transform="translate(780, 100)" filter="url(#shadow)">
