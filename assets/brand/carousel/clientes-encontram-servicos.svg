    <rect x="12" y="40" width="176" height="300" rx="12" fill="#FFFFFF"/>
    <rect x="70" y="16" width="60" height="8" rx="4" fill="#4A5568"/>
    <!-- Search bar -->
    <rect x="24" y="56" width="152" height="36" rx="18" fill="#EDF2F7"/>
    <circle cx="44" cy="74" r="10" fill="none" stroke="#0066FF" stroke-width="3"/>
    <line x1="51" y1="81" x2="58" y2="88" stroke="#0066FF" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#718096">eletricista SP</text>
    <!-- Service results -->
    <rect x="24" y="108" width="152" height="56" rx="10" fill="#FFF5F0" stroke="#FF6B35" stroke-width="2"/>
    <text x="40" y="132" font-size="22">ˇ</text>
    <text x="72" y="128" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1A1D29">Eletricista</text>
    <text x="72" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#718096">4.9  · 2 km</text>
    <rect x="24" y="172" width="152" height="56" rx="10" fill="#F0FFF4" stroke="#00C9A7" stroke-width="2"/>
    <text x="40" y="196" font-size="22">='</text>
    <text x="72" y="192" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1A1D29">Encanador</text>
    <text x="72" y="212" font-family="system-ui,sans-serif" font-size="10" fill="#718096">4.8  · 3 km</text>
    <rect x="24" y="236" width="152" height="56" rx="10" fill="#FAF5FF" stroke="#7C3AED" stroke-width="2"/>
    <text x="40" y="260" font-size="22"><¨</text>
    <text x="72" y="256" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1A1D29">Pintor</text>
    <text x="72" y="276" font-family="system-ui,sans-serif" font-size="10" fill="#718096">5.0  · 1 km</text>
    <rect x="40" y="310" width="120" height="32" rx="16" fill="#0066FF"/>
    <text x="100" y="331" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Contratar</text>
  </g>
  <!-- Radar pulse -->
  <circle cx="880" cy="200" r="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <circle cx="880" cy="200" r="70" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="880" cy="200" r="100" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <text x="880" y="208" text-anchor="middle" font-size="28">=á</text>
