    <!-- Bottom row -->
    <rect x="50" y="160" width="90" height="70" rx="8" fill="#FF6B35" opacity="0.9"/>
    <text x="95" y="205" text-anchor="middle" font-size="32"><s</text>
    <rect x="170" y="160" width="90" height="70" rx="8" fill="#0066FF" opacity="0.85"/>
    <text x="215" y="205" text-anchor="middle" font-size="32">=ú</text>
