    <text x="420" y="279" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">VENDIDO</text>
    <rect x="60" y="260" width="80" height="28" rx="14" fill="#00C9A7"/>
    <text x="100" y="279" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">VENDIDO</text>
