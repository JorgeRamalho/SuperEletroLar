<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Pessoas comprando e negociando">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="900" cy="450" r="130" fill="#FFFFFF" fill-opacity="0.07"/>
  <circle cx="700" cy="80" r="50" fill="#FFFFFF" fill-opacity="0.1"/>
  <!-- Chat negotiation panel -->
  <g transform="translate(780, 80)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="280" rx="20" fill="#FFFFFF" fill-opacity="0.95"/>
    <rect x="0" y="0" width="320" height="48" rx="20" fill="#7C3AED"/>
    <rect x="0" y="24" width="320" height="24" fill="#7C3AED"/>
    <text x="160" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">=¬ Negociaçăo Trampolim</text>
    <!-- Buyer message -->
    <rect x="16" y="64" width="200" height="52" rx="12" fill="#EDF2F7"/>
    <text x="28" y="86" font-family="system-ui,sans-serif" font-size="12" fill="#1A1D29">Posso pagar R$ 1.750?</text>
    <text x="28" y="104" font-family="system-ui,sans-serif" font-size="10" fill="#718096">Comprador · agora</text>
    <!-- Seller message -->
    <rect x="104" y="128" width="200" height="52" rx="12" fill="#FFF5F0"/>
    <text x="116" y="150" font-family="system-ui,sans-serif" font-size="12" fill="#1A1D29">Fechado! R$ 1.800 final =€</text>
    <text x="116" y="168" font-family="system-ui,sans-serif" font-size="10" fill="#718096">Vendedor · agora</text>
    <!-- Deal button -->
    <rect x="60" y="200" width="200" height="44" rx="22" fill="#FF6B35"/>
    <text x="160" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Contratar via Trampolim</text>
  </g>
  <!-- Buyer -->
  <g transform="translate(600, 200)" filter="url(#shadow)">
    <ellipse cx="70" cy="280" rx="75" ry="18" fill="#000" fill-opacity="0.15"/>
    <circle cx="70" cy="60" r="48" fill="#99F6E4"/>
    <path d="M25 130 Q70 100 115 130 L125 250 Q70 270 15 250 Z" fill="#0066FF"/>
    <text x="70" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Comprador</text>
  </g>
  <!-- Seller -->
  <g transform="translate(720, 200)" filter="url(#shadow)">
    <ellipse cx="70" cy="280" rx="75" ry="18" fill="#000" fill-opacity="0.15"/>
    <circle cx="70" cy="60" r="48" fill="#FFD4C2"/>
    <path d="M25 130 Q70 100 115 130 L125 250 Q70 270 15 250 Z" fill="#FF6B35"/>
    <text x="70" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Vendedor</text>
  </g>
  <!-- Handshake -->
  <g transform="translate(680, 220)">
    <text x="0" y="0" font-size="64">></text>
  </g>
  <!-- Money / secure -->
  <g transform="translate(640, 420)">
    <rect x="0" y="0" width="140" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.2"/>
    <text x="70" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">= Pagamento seguro</text>
  </g>
  <text x="1050" y="520" font-size="48" opacity="0.2">=°</text>
</svg>
