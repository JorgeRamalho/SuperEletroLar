services:
  super-eletrolar:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - super-eletrolar-data:/app/backend/data
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: http://localhost:4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  super-eletrolar-data:
